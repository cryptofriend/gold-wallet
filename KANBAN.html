<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gold Wallet — Execution Kanban</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #221b0f;
        background: #f6f3ea;
      }

      body {
        margin: 0;
        padding: 1rem;
      }

      h1 {
        margin: 0 0 0.3rem;
      }

      .meta {
        margin: 0 0 1rem;
        color: #6a5a3b;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(5, minmax(220px, 1fr));
        gap: 0.8rem;
        overflow-x: auto;
      }

      .col {
        background: #fff;
        border: 1px solid #eadfc7;
        border-radius: 12px;
        padding: 0.7rem;
        min-height: 380px;
      }

      .col h2 {
        margin: 0 0 0.55rem;
        font-size: 1rem;
      }

      .dropzone {
        min-height: 320px;
      }

      .card {
        border: 1px solid #e6d8b8;
        border-radius: 10px;
        padding: 0.6rem;
        margin-bottom: 0.55rem;
        background: #fffdf8;
        cursor: grab;
      }

      .card strong {
        display: block;
        margin-bottom: 0.25rem;
      }

      .chip {
        display: inline-block;
        font-size: 0.72rem;
        padding: 0.15rem 0.4rem;
        border-radius: 999px;
        margin-right: 0.3rem;
        border: 1px solid #dac79c;
        color: #664f17;
        background: #f7edcf;
      }

      .toolbar {
        margin: 0.7rem 0 1rem;
        display: flex;
        gap: 0.5rem;
      }

      button {
        border: 1px solid #d9c89f;
        background: #f8e9bc;
        color: #4e3d14;
        border-radius: 8px;
        padding: 0.45rem 0.65rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>Gold Wallet Kanban</h1>
    <p class="meta">Simple local board for roadmap execution. Drag cards between columns. Autosaves in browser.</p>

    <div class="toolbar">
      <button id="reset">Reset to default tasks</button>
    </div>

    <section class="board" id="board"></section>

    <script>
      const STORAGE_KEY = 'gold-wallet-kanban-v10'

      const columns = ['Backlog', 'Ready', 'In Progress', 'Review', 'Done']

      const defaultCards = [
        { id: 'w1-1', title: 'Add /methodology page', tags: ['Trust', 'Week 1'], status: 'Done' },
        { id: 'w1-2', title: 'Add /data-sources page', tags: ['Trust', 'Week 1'], status: 'Done' },
        { id: 'w1-3', title: 'Freshness badge on pages', tags: ['Trust', 'UX'], status: 'Done' },
        { id: 'w1-4', title: 'Stale-data fallback UI', tags: ['Reliability'], status: 'Done' },
        { id: 'w2-1', title: 'Price pages by currency', tags: ['SEO', 'Week 2'], status: 'Done' },
        { id: 'w2-2', title: 'Price pages by unit', tags: ['SEO', 'Week 2'], status: 'Done' },
        { id: 'w2-3', title: 'Sitemap segmentation', tags: ['SEO'], status: 'Done' },
        { id: 'w3-1', title: 'Country summary block', tags: ['AI SEO', 'Week 3'], status: 'Done' },
        { id: 'w3-2', title: 'Confidence indicator', tags: ['Trust'], status: 'Done' },
        { id: 'w3-3', title: 'Historical trend placeholders', tags: ['Week 3'], status: 'Done' },
        { id: 'w3-4', title: 'Top countries hub pages', tags: ['SEO', 'Week 3'], status: 'Done' },
        { id: 'w4-1', title: 'Price alert MVP', tags: ['Retention', 'Week 4'], status: 'Ready' },
        { id: 'w4-2', title: 'Watchlist MVP', tags: ['Retention', 'Week 4'], status: 'Backlog' },
        { id: 'w4-3', title: 'Public API beta', tags: ['Distribution', 'Week 4'], status: 'Backlog' },

        { id: 'ux-1', title: 'UX Loop: nav clarity pass (home → countries → country)', tags: ['UX Loop', 'Week A'], status: 'Done' },
        { id: 'ux-2', title: 'UX Loop: improve country info hierarchy (scan speed)', tags: ['UX Loop', 'Week B'], status: 'Done' },
        { id: 'ux-3', title: 'UX Loop: trust panel usability test (freshness/sources/confidence)', tags: ['UX Loop', 'Week C'], status: 'Ready' },
        { id: 'ux-4', title: 'UX Loop: conversion CTA test (alerts/watchlist)', tags: ['UX Loop', 'Week D'], status: 'Backlog' },
        { id: 'ux-5', title: 'UX Loop: measure KPI delta and decide keep/iterate/kill', tags: ['UX Loop', 'Measure'], status: 'Ready' }
      ]

      const loadCards = () => {
        const raw = localStorage.getItem(STORAGE_KEY)
        return raw ? JSON.parse(raw) : defaultCards
      }

      const saveCards = (cards) => localStorage.setItem(STORAGE_KEY, JSON.stringify(cards))

      const board = document.getElementById('board')
      let cards = loadCards()

      const render = () => {
        board.innerHTML = ''

        columns.forEach((colName) => {
          const col = document.createElement('div')
          col.className = 'col'
          col.innerHTML = `<h2>${colName}</h2><div class="dropzone" data-col="${colName}"></div>`

          const zone = col.querySelector('.dropzone')
          zone.addEventListener('dragover', (e) => e.preventDefault())
          zone.addEventListener('drop', (e) => {
            e.preventDefault()
            const id = e.dataTransfer.getData('text/plain')
            cards = cards.map((c) => (c.id === id ? { ...c, status: colName } : c))
            saveCards(cards)
            render()
          })

          cards
            .filter((c) => c.status === colName)
            .forEach((cardData) => {
              const card = document.createElement('article')
              card.className = 'card'
              card.draggable = true
              card.dataset.id = cardData.id
              card.innerHTML = `<strong>${cardData.title}</strong>${cardData.tags
                .map((t) => `<span class="chip">${t}</span>`)
                .join('')}`

              card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', cardData.id)
              })

              zone.appendChild(card)
            })

          board.appendChild(col)
        })
      }

      document.getElementById('reset').addEventListener('click', () => {
        cards = [...defaultCards]
        saveCards(cards)
        render()
      })

      render()
    </script>
  </body>
</html>
